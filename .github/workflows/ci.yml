name: CI

on:
  push:
    branches: [devel]
  pull_request:
    branches: [devel]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test -coverprofile=unit.out -covermode=atomic ./...

      - name: Integration tests
        run: |
          go test \
            -tags=integration \
            -coverprofile=integration.out \
            -covermode=atomic \
            -coverpkg=github.com/Gustik/trantor/... \
            -timeout 120s \
            ./test/integration/...

      - name: Merge coverage profiles
        run: |
          cat unit.out > coverage.out
          tail -n +2 integration.out >> coverage.out

      - name: Coverage summary
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}')
          echo "### Coverage: $TOTAL" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7
